<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>FluxOS - Operating System para Adegas e PDV</title>
    
    <!-- Anti-Cache Headers for Instant Deploys -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA Configurations -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FluxOS" />
    
    <!-- iOS WebApp capability -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="FluxOS" />
    
    <!-- Favicons & Icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    
    <!-- Initial theme application -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('adegaos_theme');
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var color = theme === 'dark' ? '#000000' : '#FFFFFF';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', color);
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch(e) {}
      })();
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[FluxOS] ServiceWorker registrado com sucesso:', reg.scope);
            })
            .catch(function(err) {
              console.error('[FluxOS] Falha ao registrar ServiceWorker:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
